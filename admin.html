<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Zhe (Joe) Deng</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    textarea { width: 100%; min-height: 420px; }
    .row { margin: 12px 0; display: flex; gap: 10px; }
  </style>
</head>
<body>
  <h1>Admin</h1>
  <p><a href="/">← Back to homepage</a></p>
  <label for="token">Admin Token</label>
  <input id="token" type="password" placeholder="X-Admin-Token" />
  <div class="row">
    <button id="loadBtn">Load</button>
    <button id="saveBtn">Save</button>
  </div>
  <p id="status"></p>
  <textarea id="editor"></textarea>

<script>
const editor = document.getElementById('editor');
const statusEl = document.getElementById('status');

function setStatus(text, error = false) {
  statusEl.textContent = text;
  statusEl.style.color = error ? '#b00020' : '#1b5e20';
}

async function loadContent() {
  setStatus('Loading...');
  const res = await fetch('/api/content');
  if (!res.ok) {
    setStatus('Load failed: ' + res.status, true);
    return;
  }
  editor.value = JSON.stringify(await res.json(), null, 2);
  setStatus('Loaded');
}

async function saveContent() {
  let payload;
  try {
    payload = JSON.parse(editor.value);
  } catch (err) {
    setStatus('Invalid JSON: ' + err.message, true);
    return;
  }

  const token = document.getElementById('token').value;
  setStatus('Saving...');
  const res = await fetch('/api/content', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    setStatus('Save failed: ' + res.status + ' ' + await res.text(), true);
    return;
  }

  setStatus('Saved');
}

document.getElementById('loadBtn').addEventListener('click', loadContent);
document.getElementById('saveBtn').addEventListener('click', saveContent);
loadContent();
</script>
</body>
</html>
