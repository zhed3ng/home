<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Console | Zhe (Joe) Deng</title>
  <link rel="stylesheet" href="/assets/css/site.css" />
  <style>
    .admin-shell { max-width: 1120px; margin: 24px auto; padding: 0 20px 40px; }
    .admin-card { background:#fff; border:1px solid var(--border-subtle); border-radius:12px; padding:20px; }
    .admin-actions { display:flex; gap:12px; margin:12px 0; flex-wrap:wrap; }
    .admin-input, .admin-editor { width:100%; border:1px solid var(--border-subtle); border-radius:8px; padding:10px; font: inherit; }
    .admin-editor { min-height:420px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .admin-grid { display:grid; gap:10px; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); }
  </style>
</head>
<body>
  <header>
    <div class="top-bar">
      <div class="logo-text"><span class="logo-circle">ZD</span>Admin Console</div>
      <nav><ul><li><a href="/">Back to site</a></li></ul></nav>
    </div>
  </header>

  <main class="admin-shell">
    <section class="admin-card">
      <h1>Content Admin</h1>
      <p class="meta">请先用授权邮箱获取验证码，验证后才可以保存内容。</p>

      <div class="admin-grid">
        <div>
          <label for="email">Admin Email</label>
          <input class="admin-input" id="email" type="email" placeholder="zhe.joe.deng@gmail.com" />
        </div>
        <div>
          <label for="code">Verification Code</label>
          <input class="admin-input" id="code" type="text" placeholder="6-digit code" />
        </div>
      </div>

      <div class="admin-actions">
        <button class="btn" id="requestCodeBtn">Send Code</button>
        <button class="btn" id="verifyCodeBtn">Verify</button>
        <button class="btn" id="loadBtn">Load</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
      <p id="status" class="meta"></p>
      <textarea class="admin-editor" id="editor"></textarea>
    </section>
  </main>

  <script src="/assets/js/admin.js"></script>
</body>
</html>
